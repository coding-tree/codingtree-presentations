<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Języki Programowania — Mapa Świata</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f0f1e;
    --bg-card: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.16);
    --fg: #e8eaff;
    --muted: rgba(232,234,255,0.65);
    --dim: rgba(232,234,255,0.4);
    --gold: #FFAB19;
    --pink: #FF6680;
    --cyan: #66ccff;
    --green: #00ff88;
    --red: #ff6680;
    --code-bg: #0a0a14;
  }
  html { scroll-behavior: smooth; scroll-padding-top: 80px; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    line-height: 1.55;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse 800px 600px at 10% -10%, rgba(255,171,25,0.08), transparent 60%),
      radial-gradient(ellipse 600px 500px at 90% 5%, rgba(255,102,128,0.07), transparent 60%),
      radial-gradient(ellipse 1000px 700px at 50% 100%, rgba(102,204,255,0.05), transparent 60%);
    background-attachment: fixed;
  }

  /* HERO */
  .hero {
    text-align: center;
    padding: 80px 20px 60px;
    max-width: 900px;
    margin: 0 auto;
  }
  .hero h1 {
    font-size: clamp(2.4rem, 6vw, 4.4rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.05;
    background: linear-gradient(135deg, var(--gold) 0%, var(--pink) 60%, var(--cyan) 120%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
  }
  .hero .subtitle {
    font-size: clamp(1rem, 2vw, 1.3rem);
    color: var(--muted);
    max-width: 640px;
    margin: 0 auto 28px;
  }
  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 28px;
    flex-wrap: wrap;
    font-size: 0.92em;
    color: var(--dim);
  }
  .hero-stats strong { color: var(--gold); font-weight: 700; font-size: 1.15em; }

  /* STICKY NAV */
  .sticky-nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15, 15, 30, 0.85);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 10px 0;
    margin-bottom: 30px;
  }
  .nav-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border-strong) transparent;
  }
  .nav-inner::-webkit-scrollbar { height: 4px; }
  .nav-inner::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
  .nav-tab {
    flex: 0 0 auto;
    padding: 7px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
    color: var(--muted);
    text-decoration: none;
    font-size: 0.85em;
    font-weight: 600;
    white-space: nowrap;
    border: 1px solid transparent;
    transition: all 0.2s;
  }
  .nav-tab:hover { background: rgba(255,255,255,0.08); color: var(--fg); }
  .nav-tab.active {
    background: rgba(255,171,25,0.18);
    border-color: rgba(255,171,25,0.4);
    color: #fff;
  }

  /* MAIN */
  main { max-width: 1000px; margin: 0 auto; padding: 0 20px 80px; }
  .family { margin-bottom: 80px; scroll-margin-top: 80px; }
  .family-head {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .family-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95em;
    color: var(--gold);
    font-weight: 600;
    background: rgba(255,171,25,0.1);
    padding: 3px 10px;
    border-radius: 6px;
    letter-spacing: 0.05em;
  }
  .family-head h2 {
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .family-intro {
    color: var(--muted);
    margin-bottom: 22px;
    max-width: 760px;
  }

  /* LANGUAGE CARD */
  .lang-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 26px;
    position: relative;
  }
  .lang-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 8px;
  }
  .lang-name {
    font-size: 1.7em;
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  .lang-meta {
    font-size: 0.85em;
    color: var(--dim);
    font-family: 'JetBrains Mono', monospace;
  }
  .lang-desc { color: var(--muted); margin-bottom: 18px; }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    margin-bottom: 18px;
  }
  .two-col strong { color: var(--gold); display: block; font-size: 0.85em; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 4px; }
  .two-col p { color: var(--muted); font-size: 0.95em; }

  .famous {
    background: rgba(102,204,255,0.06);
    border-left: 3px solid var(--cyan);
    padding: 12px 16px;
    border-radius: 4px;
    margin-bottom: 18px;
    font-size: 0.95em;
  }
  .famous strong { color: var(--cyan); display: inline; font-size: 0.85em; letter-spacing: 0.04em; text-transform: uppercase; margin-right: 8px; }
  .famous span { color: var(--muted); }

  .pros-cons { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px; }
  .pros, .cons {
    padding: 12px 14px;
    border-radius: 6px;
    font-size: 0.92em;
  }
  .pros { background: rgba(0,255,136,0.05); border-left: 3px solid var(--green); }
  .cons { background: rgba(255,102,128,0.05); border-left: 3px solid var(--red); }
  .pros .label, .cons .label {
    display: block;
    font-size: 0.78em;
    letter-spacing: 0.06em;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .pros .label { color: var(--green); }
  .cons .label { color: var(--red); }
  .pros ul, .cons ul { padding-left: 18px; color: var(--muted); }
  .pros li, .cons li { margin-bottom: 2px; }

  .code-label { font-size: 0.78em; color: var(--dim); letter-spacing: 0.08em; margin-bottom: 6px; text-transform: uppercase; }
  pre.code {
    background: var(--code-bg);
    padding: 16px 18px;
    border-radius: 8px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88em;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: normal;
    color: var(--fg);
    margin-bottom: 18px;
    border: 1px solid var(--border);
  }

  .siblings {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 18px;
  }
  .siblings .label {
    font-size: 0.78em;
    color: var(--dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .sibling { margin-bottom: 6px; font-size: 0.92em; }
  .sibling:last-child { margin-bottom: 0; }
  .sibling-name { color: var(--gold); font-weight: 600; }
  .sibling-desc { color: var(--muted); }

  .ciekawostki-row { display: flex; justify-content: flex-end; }
  .ciekawostki-btn {
    background: linear-gradient(135deg, var(--gold), var(--pink));
    border: none;
    color: #1a1a2e;
    font-weight: 700;
    padding: 9px 20px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 0.9em;
    box-shadow: 0 4px 14px rgba(255,171,25,0.25);
    transition: transform 0.15s, box-shadow 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .ciekawostki-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(255,171,25,0.35); }

  /* POPUP */
  .popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(9,9,15,0.78);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 24px;
    z-index: 200;
    animation: fadeIn 0.18s ease;
  }
  .popup-overlay.open { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .popup-box {
    background: #16213e;
    border: 1px solid rgba(255,171,25,0.4);
    border-radius: 14px;
    padding: 26px 28px;
    max-width: 640px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .popup-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .popup-head h3 { font-size: 1.4em; font-weight: 700; }
  .popup-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.8em;
    line-height: 1;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 6px;
  }
  .popup-close:hover { background: rgba(255,255,255,0.06); color: var(--fg); }
  .popup-list { padding-left: 22px; line-height: 1.7; }
  .popup-list li { margin-bottom: 10px; color: var(--muted); }
  .popup-list li strong { color: var(--gold); }
  .popup-list li:nth-child(2) strong { color: var(--cyan); }
  .popup-list li:nth-child(3) strong { color: var(--pink); }
  .popup-list li:nth-child(4) strong { color: var(--green); }

  /* CHRONOLOGY */
  .timeline-wrap {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    overflow-x: auto;
  }
  .timeline {
    display: grid;
    grid-template-columns: repeat(8, minmax(140px, 1fr));
    gap: 14px;
    min-width: 1100px;
  }
  .timeline .decade {
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85em;
    color: var(--dim);
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
    font-weight: 600;
    letter-spacing: 0.05em;
  }
  .timeline .col { display: flex; flex-direction: column; gap: 6px; }
  .lang-pill {
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 0.82em;
    border: 1px solid;
    background: rgba(255,255,255,0.02);
    font-weight: 600;
  }
  .fam-1 { color: #b39ddb; border-color: rgba(179,157,219,0.4); background: rgba(179,157,219,0.08); }
  .fam-2 { color: #ffab91; border-color: rgba(255,171,145,0.4); background: rgba(255,171,145,0.08); }
  .fam-3 { color: #80cbc4; border-color: rgba(128,203,196,0.4); background: rgba(128,203,196,0.08); }
  .fam-4 { color: #ffd54f; border-color: rgba(255,213,79,0.4); background: rgba(255,213,79,0.08); }
  .fam-5 { color: #ff7043; border-color: rgba(255,112,67,0.4); background: rgba(255,112,67,0.08); }
  .fam-6 { color: #ffee58; border-color: rgba(255,238,88,0.4); background: rgba(255,238,88,0.08); }
  .fam-7 { color: #4fc3f7; border-color: rgba(79,195,247,0.4); background: rgba(79,195,247,0.08); }
  .fam-8 { color: #ce93d8; border-color: rgba(206,147,216,0.4); background: rgba(206,147,216,0.08); }
  .fam-9 { color: #aed581; border-color: rgba(174,213,129,0.4); background: rgba(174,213,129,0.08); }
  .fam-10 { color: #f06292; border-color: rgba(240,98,146,0.4); background: rgba(240,98,146,0.08); }
  .fam-11 { color: #4dd0e1; border-color: rgba(77,208,225,0.4); background: rgba(77,208,225,0.08); }
  .fam-12 { color: #ff8a65; border-color: rgba(255,138,101,0.4); background: rgba(255,138,101,0.08); }

  .lineage {
    margin-top: 28px;
    padding: 18px 20px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .lineage h3 {
    font-size: 1.05em;
    color: var(--gold);
    margin-bottom: 12px;
    letter-spacing: 0.02em;
  }
  .lineage-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88em;
    color: var(--muted);
    margin-bottom: 6px;
    padding: 4px 0;
  }
  .lineage-line strong { color: var(--cyan); font-weight: 600; }

  /* COMPILERS chapter (meta) */
  .meta-block {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 26px;
    margin-bottom: 18px;
  }
  .meta-block h3 {
    color: var(--gold);
    font-size: 1.2em;
    margin-bottom: 12px;
    font-weight: 700;
  }
  .meta-block p { color: var(--muted); margin-bottom: 10px; }
  .pipeline {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 14px 0;
    flex-wrap: wrap;
    justify-content: center;
  }
  .pipe-step {
    background: rgba(255,171,25,0.1);
    border: 1px solid rgba(255,171,25,0.3);
    color: var(--gold);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82em;
    font-weight: 600;
  }
  .pipe-arrow { color: var(--dim); font-size: 1.1em; }
  .meta-block code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88em;
    color: var(--cyan);
  }
  .closing {
    text-align: center;
    padding: 40px 20px 20px;
    color: var(--muted);
    font-size: 1.05em;
    font-style: italic;
    max-width: 720px;
    margin: 30px auto 0;
    border-top: 1px solid var(--border);
  }
  .closing strong { color: var(--gold); font-style: normal; }

  /* RESPONSIVE */
  @media (max-width: 720px) {
    .two-col, .pros-cons { grid-template-columns: 1fr; }
    .hero { padding: 50px 16px 30px; }
    .lang-card { padding: 18px 20px; }
    main { padding: 0 14px 60px; }
    .lang-head { flex-direction: column; align-items: flex-start; gap: 4px; }
  }
</style>
</head>
<body>

<header class="hero">
  <h1>Języki Programowania</h1>
  <p class="subtitle">Mapa świata, w którym kodujemy. Każda rodzina rozwiązała inny problem.</p>
  <div class="hero-stats">
    <div><strong>~50</strong> języków</div>
    <div><strong>12</strong> rodzin</div>
    <div><strong>70</strong> lat historii</div>
  </div>
</header>

<nav class="sticky-nav" id="nav">
  <div class="nav-inner" id="navInner"></div>
</nav>

<main id="main"></main>

<div class="popup-overlay" id="popup" onclick="closePopup(event)">
  <div class="popup-box" onclick="event.stopPropagation()">
    <div class="popup-head">
      <h3 id="popupTitle"></h3>
      <button class="popup-close" onclick="closePopup()">×</button>
    </div>
    <ul class="popup-list" id="popupList"></ul>
  </div>
</div>

<script>
const families = [
  {
    id: 'assembly', short: 'Assembly', num: '01',
    title: 'Assembly — język procesora',
    intro: 'Każdy program ostatecznie jest tłumaczony na ciąg instrukcji procesora. Assembly to bezpośredni, symboliczny zapis tych instrukcji — najbliżej sprzętu, jak się da bez chwytania za lutownicę.',
    lang: {
      name: 'x86 / x86-64 assembly',
      meta: '1978 (8086) · Intel · imperatywny / niskopoziomowy',
      desc: 'Każda instrukcja = jedna operacja CPU. Programujesz rejestry, pamięć, flagi — bez żadnej abstrakcji ponad tym.',
      doCzego: 'Bootloadery, sterowniki, kryptografia, kod krytyczny czasowo, demoscena, optymalizacja gorących pętli.',
      coRozwiazal: 'Pierwszy krok od fizycznych przełączników do symboli — zamiast 10110010, piszesz <code>MOV AX, 5</code>.',
      famous: 'BIOS i bootloadery (GRUB), rdzeń każdego OS, RollerCoaster Tycoon (cały silnik!), demoscena 64KB.',
      mocne: ['Najszybszy możliwy kod', 'Pełna kontrola nad sprzętem', 'Edukacyjny — widzisz jak naprawdę działa komputer'],
      slabe: ['Inny dla każdego CPU (x86, ARM, RISC-V)', 'Brak abstrakcji — wszystko ręcznie', 'Łatwo o błąd na poziomie rejestrów'],
      code: `section .data
    msg db "Hello, World!", 10
section .text
    global _start
_start:
    mov rax, 1       ; sys_write
    mov rdi, 1       ; stdout
    mov rsi, msg
    mov rdx, 14
    syscall
    mov rax, 60      ; sys_exit
    syscall`,
      siblings: [
        { name: 'ARM assembly', desc: 'język telefonów, Apple Silicon, większości IoT' },
        { name: 'RISC-V', desc: 'otwarta architektura z 2010 — alternatywa dla Intela i ARM' },
        { name: 'WebAssembly (Wasm)', desc: 'od 2017 — "assembly" przeglądarki, język pośredni dla wielu języków' }
      ],
      ciekawostki: [
        '<strong>RollerCoaster Tycoon (1999)</strong> — popularna gra napisana w 99% w czystym asemblerze przez Chrisa Sawyera. Dlatego działała płynnie na słabych komputerach swojej epoki.',
        '<strong>Demoscena</strong> — kultura programistów piszących grafikę 3D z muzyką w <strong>64KB asemblera</strong>. Mniej niż jedno zdjęcie z telefonu, a wygląda jak teledysk.',
        '<strong>Programy w asemblerze są nieprzenośne</strong> — kod na x86 nie zadziała na ARM bez przepisania. Dlatego wynaleziono kompilatory.',
        '<strong>WebAssembly</strong> to nowoczesny powrót idei "assembly" — przeglądarki rozumieją coś bardzo podobnego do asemblera, żeby uruchamiać Rust, C++ i Go w sieci.'
      ]
    }
  },
  {
    id: 'stare', short: 'Stare strukturalne', num: '02',
    title: 'Stare strukturalne — pierwsze języki wysokiego poziomu',
    intro: 'Pierwsze języki, w których pisze się "X = (Y + Z) / 2" zamiast bezpośrednich instrukcji procesora. Wymyślili pętle, procedury, zmienne — fundamenty, których używamy do dziś.',
    lang: {
      name: 'Fortran',
      meta: '1957 · John Backus / IBM · imperatywny / strukturalny',
      desc: 'Pierwszy szeroko używany język wysokiego poziomu. Zaprojektowany dla obliczeń naukowych — i wciąż króluje w tej niszy.',
      doCzego: 'Obliczenia naukowe, symulacje klimatu, fizyki, fluid dynamics, NASA, prognozy pogody, superkomputery.',
      coRozwiazal: 'Po raz pierwszy programista mógł pisać matematyczne wzory zamiast manipulować rejestrami. To wynalezienie języka "wysokiego poziomu".',
      famous: 'NASA misje Apollo, modele klimatyczne IPCC, superkomputery, LAPACK (biblioteka algebry liniowej używana wszędzie do dziś).',
      mocne: ['Niezwykle szybki w obliczeniach numerycznych', 'Najlepsze biblioteki naukowe na świecie', 'Wciąż aktualnie używany — nie umarł'],
      slabe: ['Składnia 60 lat stara', 'Brak nowoczesnych abstrakcji', 'Mało znany poza światem nauki'],
      code: `PROGRAM HELLO
  INTEGER :: I
  DO I = 1, 5
    PRINT *, 'Witaj, świecie! ', I
  END DO
END PROGRAM HELLO`,
      siblings: [
        { name: 'COBOL (1959)', desc: 'język biznesu i banków — 220 miliardów linii nadal działa w 2024 r.' },
        { name: 'BASIC (1964)', desc: 'język nauki dla studentów; potem domowe komputery (Commodore, Atari)' },
        { name: 'ALGOL (1958)', desc: 'akademicki — nikt go nie używa dziś, ale ukształtował składnię WSZYSTKICH późniejszych języków' }
      ],
      ciekawostki: [
        '<strong>COBOL nigdy nie umarł.</strong> W 2020 stany USA pilnie szukały programistów COBOL bo systemy zasiłków pandemicznych były na nim oparte. <strong>220 miliardów linii COBOL</strong> wciąż działa w bankach i ubezpieczeniach.',
        '<strong>John Backus dostał Turinga (1977)</strong> za Fortrana — to było jak Nagroda Nobla dla informatyki.',
        '<strong>ALGOL nie miał znaków { i }</strong> bo nie wszystkie ówczesne klawiatury je miały — używano <code>BEGIN</code> i <code>END</code>. Pascal i Ada dziedziczą po nim ten styl.',
        '<strong>Pierwszy "bug"</strong> (1947) był dosłownie ćmą w przekaźniku Harvard Mark II — Grace Hopper (autorka kompilatorów COBOL) wkleiła ćmę do dziennika z podpisem "first actual case of bug".'
      ]
    }

// POPUP
function showPopup(famId) {
  const fam = families.find(f => f.id === famId);
  if (!fam) return;
  document.getElementById('popupTitle').innerHTML = `💡 ${fam.lang.name} — Ciekawostki`;
  const ul = document.getElementById('popupList');
  ul.innerHTML = fam.lang.ciekawostki.map(c => `<li>${c}</li>`).join('');
  document.getElementById('popup').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closePopup(e) {
  if (e && e.target.id !== 'popup' && !e.target.classList.contains('popup-close')) return;
  document.getElementById('popup').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopup({ target: { id: 'popup' } }); });

// SCROLL-SPY (highlight only — no auto-scroll, that interrupts smooth-scroll)
const tabs = document.querySelectorAll('.nav-tab');
const sections = document.querySelectorAll('main > section');
let lastActive = null;
function updateNav() {
  let current = sections[0]?.id;
  const offset = 120;
  sections.forEach(sec => {
    if (sec.getBoundingClientRect().top - offset <= 0) current = sec.id;
  });
  if (current === lastActive) return;
  lastActive = current;
  tabs.forEach(t => {
    if (t.dataset.target === current) t.classList.add('active');
    else t.classList.remove('active');
  });
}
window.addEventListener('scroll', updateNav, { passive: true });
updateNav();

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
