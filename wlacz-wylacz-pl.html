<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wlacz / Wylacz</title>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg-deep:#0b0e2d;--bg-mid:#131847;--neon-green:#39ff14;--neon-blue:#00d4ff;--neon-pink:#ff2eaa;--neon-yellow:#ffe600;--neon-orange:#ff6b2b;--soft-white:#e8eaff;--glass:rgba(255,255,255,0.06);--glass-border:rgba(255,255,255,0.12)}
        body{font-family:'Nunito',sans-serif;background:var(--bg-deep);color:var(--soft-white);min-height:100vh;overflow:hidden}
        .bg-grid{position:fixed;inset:0;background-image:linear-gradient(rgba(57,255,20,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(57,255,20,0.03) 1px,transparent 1px);background-size:40px 40px;z-index:0;pointer-events:none}
        .bg-glow{position:fixed;width:600px;height:600px;border-radius:50%;filter:blur(120px);opacity:0.15;pointer-events:none;z-index:0}
        .bg-glow.g1{background:var(--neon-blue);top:-200px;left:-100px}
        .bg-glow.g2{background:var(--neon-pink);bottom:-200px;right:-100px}
        .bg-glow.g3{background:var(--neon-green);top:50%;left:50%;transform:translate(-50%,-50%);opacity:0.07}
        .binary-rain{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
        .binary-rain span{position:absolute;top:-40px;font-family:'Baloo 2',monospace;font-size:1.1rem;color:var(--neon-green);opacity:0.08;animation:rain linear infinite}
        @keyframes rain{to{transform:translateY(110vh)}}
        .presentation{width:100vw;height:100vh;position:relative;z-index:1}
        .slide{position:absolute;inset:0;display:none;flex-direction:column;justify-content:center;align-items:center;padding:40px 40px 110px;animation:slideIn 0.5s ease;overflow-y:auto;gap:10px}
        .slide.active{display:flex}
        @keyframes slideIn{from{opacity:0;transform:translateY(30px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
        h1{font-family:'Baloo 2',cursive;font-weight:800;font-size:4.5rem;text-align:center;line-height:1.15;margin-bottom:10px}
        h2{font-family:'Baloo 2',cursive;font-weight:700;font-size:2.8rem;margin-bottom:15px;text-align:center}
        .gradient-text{background:linear-gradient(135deg,var(--neon-green),var(--neon-blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .gradient-pink{background:linear-gradient(135deg,var(--neon-pink),var(--neon-orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .gradient-yellow{background:linear-gradient(135deg,var(--neon-yellow),var(--neon-orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .glass-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:24px;padding:30px;backdrop-filter:blur(10px);max-width:900px;width:100%}
        .emoji-huge{font-size:7rem;line-height:1;cursor:pointer;user-select:none;transition:transform 0.2s,filter 0.3s}
        .emoji-huge:hover{transform:scale(1.1)}
        .emoji-huge.dim{filter:brightness(0.3)}

        /* Bulb */
        .bulb-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;user-select:none}
        .bulb{font-size:6rem;transition:filter 0.3s,transform 0.2s,text-shadow 0.3s}
        .bulb.on{filter:brightness(1);text-shadow:0 0 40px rgba(255,230,0,0.8),0 0 80px rgba(255,200,0,0.4)}
        .bulb.off{filter:brightness(0.3);text-shadow:none}
        .bulb-label{font-family:'Baloo 2',cursive;font-size:3rem;font-weight:800;transition:color 0.3s}

        /* Switches */
        .switch-row{display:flex;gap:30px;justify-content:center;flex-wrap:wrap;margin:15px 0}
        .switch-box{display:flex;flex-direction:column;align-items:center;gap:10px}
        .switch-track{width:70px;height:120px;border-radius:35px;background:#1a1e3a;border:3px solid var(--glass-border);cursor:pointer;position:relative;transition:background 0.3s,border-color 0.3s}
        .switch-track.on{background:rgba(57,255,20,0.15);border-color:var(--neon-green)}
        .switch-knob{width:58px;height:58px;border-radius:50%;background:#555;position:absolute;left:3px;bottom:3px;transition:all 0.3s;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
        .switch-track.on .switch-knob{bottom:auto;top:3px;background:var(--neon-green);box-shadow:0 0 20px rgba(57,255,20,0.5)}
        .switch-val{font-family:'Baloo 2',cursive;font-size:2.5rem;font-weight:800;min-height:50px}

        /* Quiz buttons */
        .quiz-row{display:flex;gap:30px;justify-content:center;margin:15px 0}
        .q-btn{width:90px;height:90px;border-radius:50%;border:4px solid var(--glass-border);background:var(--glass);font-size:3rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
        .q-btn:hover{transform:scale(1.1)}
        .q-btn.yes:hover,.q-btn.yes.picked{border-color:var(--neon-green);background:rgba(57,255,20,0.15)}
        .q-btn.no:hover,.q-btn.no.picked{border-color:var(--neon-pink);background:rgba(255,46,170,0.1)}
        .q-btn.correct{border-color:var(--neon-green)!important;background:rgba(57,255,20,0.25)!important;box-shadow:0 0 30px rgba(57,255,20,0.3)}
        .q-btn.wrong{border-color:var(--neon-pink)!important;background:rgba(255,46,170,0.15)!important;opacity:0.5}
        .quiz-emoji{font-size:6rem;margin:10px 0;min-height:100px;display:flex;align-items:center;justify-content:center;gap:20px}
        .quiz-feedback{font-family:'Baloo 2',cursive;font-size:1.5rem;min-height:40px;text-align:center}
        .round-dots{display:flex;gap:8px;justify-content:center;margin-top:5px}
        .dot{width:14px;height:14px;border-radius:50%;background:#333;transition:background 0.3s}
        .dot.done{background:var(--neon-green)}
        .dot.current{background:var(--neon-blue);box-shadow:0 0 10px rgba(0,212,255,0.5)}

        /* Pattern bulbs */
        .pattern-row{display:flex;gap:20px;justify-content:center;margin:15px 0;flex-wrap:wrap}
        .pat-bulb{width:70px;height:70px;border-radius:50%;background:#1a1e3a;border:3px solid var(--glass-border);cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;font-size:2.5rem}
        .pat-bulb.on{background:rgba(255,230,0,0.3);border-color:var(--neon-yellow);box-shadow:0 0 25px rgba(255,230,0,0.4)}
        .pat-bulb.showing{pointer-events:none}
        .pattern-msg{font-family:'Baloo 2',cursive;font-size:1.8rem;text-align:center;min-height:50px}

        /* Secret letter */
        .letter-reveal{font-family:'Baloo 2',cursive;font-size:5rem;font-weight:800;min-height:80px;text-align:center}
        .letters-collected{display:flex;gap:15px;justify-content:center;margin:10px 0}
        .letter-slot{width:70px;height:80px;border-radius:16px;border:3px dashed var(--glass-border);display:flex;align-items:center;justify-content:center;font-family:'Baloo 2',cursive;font-size:3rem;font-weight:800}
        .letter-slot.filled{border-style:solid;border-color:var(--neon-green);color:var(--neon-green)}

        .success-burst{position:fixed;pointer-events:none;z-index:100}
        .confetti{position:absolute;width:8px;height:8px;border-radius:2px;animation:cFall 1.2s ease-out forwards}
        @keyframes cFall{0%{transform:translateY(0) rotate(0) scale(1);opacity:1}100%{transform:translateY(200px) rotate(720deg) scale(0);opacity:0}}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
        @keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-10deg)}75%{transform:rotate(10deg)}}
        @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
        .title-bulb{animation:pulse 2s ease-in-out infinite}
        .bravo-emoji{font-size:5rem;animation:float 2s ease-in-out infinite}
        .bravo-emoji:nth-child(2){animation-delay:0.3s}
        .bravo-emoji:nth-child(3){animation-delay:0.6s}

        .nav{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);display:flex;gap:16px;align-items:center;z-index:50;background:rgba(11,14,45,0.85);backdrop-filter:blur(12px);padding:12px 24px;border-radius:20px;border:1px solid var(--glass-border)}
        .nav-btn{width:56px;height:56px;border-radius:16px;border:2px solid var(--glass-border);background:var(--glass);color:var(--soft-white);font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
        .nav-btn:hover:not(:disabled){border-color:var(--neon-blue);background:rgba(0,212,255,0.1)}
        .nav-btn:disabled{opacity:0.3;cursor:default}
        .slide-counter{font-family:'Baloo 2',monospace;font-size:1.1rem;font-weight:700;opacity:0.6;min-width:60px;text-align:center}
        .progress-bar{position:fixed;top:0;left:0;height:4px;background:linear-gradient(90deg,var(--neon-green),var(--neon-blue));transition:width 0.4s ease;z-index:50;border-radius:0 2px 2px 0}
        @media(max-width:768px){.slide{padding:15px 10px 100px}h1{font-size:3rem}h2{font-size:2rem}.emoji-huge{font-size:5rem}.bulb{font-size:4rem}.pat-bulb{width:50px;height:50px;font-size:1.8rem}.q-btn{width:70px;height:70px;font-size:2.5rem}}
    </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow g1"></div><div class="bg-glow g2"></div><div class="bg-glow g3"></div>
<div class="binary-rain" id="rain"></div>
<div class="progress-bar" id="progressBar"></div>

<div class="presentation">

<!-- SLIDE 1: Title -->
<div class="slide active" data-slide="0">
    <div class="title-bulb" style="font-size:8rem;">💡</div>
    <h1><span class="gradient-text">Wlacz / Wylacz</span></h1>
    <div style="font-size:3rem;">🔛 🔴 🟢 🔵</div>
</div>

<!-- SLIDE 2: Tap the lamp -->
<div class="slide" data-slide="1">
    <h2><span class="gradient-pink">💡</span></h2>
    <div id="tapBulb" class="emoji-huge" onclick="toggleTapBulb()" style="font-size:10rem;">💡</div>
    <div id="tapState" style="font-size:2rem;font-family:'Baloo 2';font-weight:700;min-height:40px;"></div>
</div>

<!-- SLIDE 3: ON=1, OFF=0 -->
<div class="slide" data-slide="2">
    <h2><span class="gradient-yellow">1 &amp; 0</span></h2>
    <div style="display:flex;gap:60px;align-items:center;justify-content:center;flex-wrap:wrap;">
        <div class="bulb-wrap" onclick="toggleBulb3('b3a')">
            <div class="bulb on" id="b3a">💡</div>
            <div class="bulb-label" id="b3a-label" style="color:var(--neon-green)">1</div>
        </div>
        <div style="font-size:3rem;font-family:'Baloo 2';font-weight:800;opacity:0.3">|</div>
        <div class="bulb-wrap" onclick="toggleBulb3('b3b')">
            <div class="bulb off" id="b3b">💡</div>
            <div class="bulb-label" id="b3b-label" style="color:var(--neon-pink)">0</div>
        </div>
    </div>
</div>

<!-- SLIDE 4: Switch wall -->
<div class="slide" data-slide="3">
    <h2><span class="gradient-text">🔀</span></h2>
    <div class="switch-row" id="switchWall">
        <div class="switch-box"><div class="switch-val" id="sw0-val">0</div><div class="switch-track" id="sw0" onclick="toggleSwitch(0)"><div class="switch-knob"></div></div></div>
        <div class="switch-box"><div class="switch-val" id="sw1-val">0</div><div class="switch-track" id="sw1" onclick="toggleSwitch(1)"><div class="switch-knob"></div></div></div>
        <div class="switch-box"><div class="switch-val" id="sw2-val">0</div><div class="switch-track" id="sw2" onclick="toggleSwitch(2)"><div class="switch-knob"></div></div></div>
        <div class="switch-box"><div class="switch-val" id="sw3-val">0</div><div class="switch-track" id="sw3" onclick="toggleSwitch(3)"><div class="switch-knob"></div></div></div>
    </div>
    <div id="switchBinary" style="font-family:'Baloo 2';font-size:2rem;font-weight:700;color:var(--neon-blue);text-align:center;min-height:40px;">= 0</div>
</div>

<!-- SLIDE 5: Animal quiz -->
<div class="slide" data-slide="4">
    <h2><span class="gradient-pink">🐾</span></h2>
    <div class="quiz-emoji" id="animalQ"></div>
    <div class="quiz-row">
        <button class="q-btn yes" id="animalYes" onclick="answerAnimal(true)">✅</button>
        <button class="q-btn no" id="animalNo" onclick="answerAnimal(false)">❌</button>
    </div>
    <div class="quiz-feedback" id="animalFeedback"></div>
    <div class="round-dots" id="animalDots"></div>
</div>

<!-- SLIDE 6: True/False pictures -->
<div class="slide" data-slide="5">
    <h2><span class="gradient-yellow">🤔</span></h2>
    <div class="quiz-emoji" id="tfQ"></div>
    <div class="quiz-row">
        <button class="q-btn yes" id="tfYes" onclick="answerTF(true)">✅</button>
        <button class="q-btn no" id="tfNo" onclick="answerTF(false)">❌</button>
    </div>
    <div class="quiz-feedback" id="tfFeedback"></div>
    <div class="round-dots" id="tfDots"></div>
</div>

<!-- SLIDE 7: Light pattern easy (4 bulbs) -->
<div class="slide" data-slide="6">
    <h2><span class="gradient-text">👀</span></h2>
    <div class="pattern-row" id="pattern4"></div>
    <div class="pattern-msg" id="pattern4Msg"></div>
    <div class="round-dots" id="pattern4Dots"></div>
</div>

<!-- SLIDE 8: Light pattern harder (6 bulbs) -->
<div class="slide" data-slide="7">
    <h2><span class="gradient-pink">🧠</span></h2>
    <div class="pattern-row" id="pattern6"></div>
    <div class="pattern-msg" id="pattern6Msg"></div>
    <div class="round-dots" id="pattern6Dots"></div>
</div>

<!-- SLIDE 9: Secret letter -->
<div class="slide" data-slide="8">
    <h2><span class="gradient-yellow">🔐</span></h2>
    <div class="letters-collected" id="letterSlots"></div>
    <div class="pattern-row" id="letterBulbs"></div>
    <div class="pattern-msg" id="letterMsg"></div>
</div>

<!-- SLIDE 10: Bravo -->
<div class="slide" data-slide="9">
    <div style="display:flex;gap:20px;justify-content:center;">
        <span class="bravo-emoji">⭐</span>
        <span class="bravo-emoji">🎉</span>
        <span class="bravo-emoji">⭐</span>
    </div>
    <h1><span class="gradient-text">Brawo!</span></h1>
    <div style="font-size:2rem;opacity:0.5;font-family:'Baloo 2';">Coding Tree 🌳</div>
</div>

</div>

<!-- Navigation -->
<div class="nav">
    <button class="nav-btn" id="prevBtn" onclick="changeSlide(-1)" disabled>◀</button>
    <span class="slide-counter" id="slideCounter">1 / 10</span>
    <button class="nav-btn" id="nextBtn" onclick="changeSlide(1)">▶</button>
</div>

<script>
// === AUDIO ===
let audioCtx;
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function playSound(freq,dur,type='sine'){
    ensureAudio();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=type;o.frequency.value=freq;g.gain.value=0.25;
    o.connect(g);g.connect(audioCtx.destination);o.start();
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
    o.stop(audioCtx.currentTime+dur);
}
function playOn(){playSound(660,0.15);}
function playOff(){playSound(330,0.15);}
function playSuccess(){playSound(523,0.1);setTimeout(()=>playSound(659,0.1),100);setTimeout(()=>playSound(784,0.2),200);}
function playError(){playSound(200,0.3,'sawtooth');}

// === BINARY RAIN ===
const rainEl=document.getElementById('rain');
for(let i=0;i<25;i++){const s=document.createElement('span');s.textContent=Math.random()>0.5?'1':'0';s.style.left=Math.random()*100+'%';s.style.animationDuration=(6+Math.random()*10)+'s';s.style.animationDelay=Math.random()*8+'s';rainEl.appendChild(s);}

// === NAVIGATION ===
let currentSlide=0;
const slides=document.querySelectorAll('.slide');
const totalSlides=slides.length;

function changeSlide(dir){
    const next=currentSlide+dir;
    if(next<0||next>=totalSlides)return;
    slides[currentSlide].classList.remove('active');
    currentSlide=next;
    slides[currentSlide].classList.add('active');
    updateNav();
    onSlideEnter(currentSlide);
}
function updateNav(){
    document.getElementById('prevBtn').disabled=currentSlide===0;
    document.getElementById('nextBtn').disabled=currentSlide===totalSlides-1;
    document.getElementById('slideCounter').textContent=(currentSlide+1)+' / '+totalSlides;
    document.getElementById('progressBar').style.width=((currentSlide+1)/totalSlides*100)+'%';
}
document.addEventListener('keydown',e=>{
    if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();changeSlide(1);}
    if(e.key==='ArrowLeft'){e.preventDefault();changeSlide(-1);}
});
updateNav();

// === CONFETTI ===
function spawnConfetti(anchor){
    const rect=anchor.getBoundingClientRect();
    const burst=document.createElement('div');
    burst.className='success-burst';
    burst.style.left=(rect.left+rect.width/2)+'px';
    burst.style.top=rect.top+'px';
    const colors=['#39ff14','#00d4ff','#ff2eaa','#ffe600','#ff6b2b'];
    for(let i=0;i<25;i++){
        const c=document.createElement('div');c.className='confetti';
        c.style.background=colors[Math.floor(Math.random()*colors.length)];
        c.style.left=(Math.random()-0.5)*250+'px';
        c.style.animationDuration=(0.6+Math.random()*0.8)+'s';
        c.style.animationDelay=(Math.random()*0.2)+'s';
        burst.appendChild(c);
    }
    document.body.appendChild(burst);
    setTimeout(()=>burst.remove(),2500);
}

// === SLIDE 2: Tap the lamp ===
let tapOn=false;
function toggleTapBulb(){
    tapOn=!tapOn;
    const el=document.getElementById('tapBulb');
    if(tapOn){el.classList.remove('dim');el.style.textShadow='0 0 60px rgba(255,230,0,0.8)';playOn();}
    else{el.classList.add('dim');el.style.textShadow='none';playOff();}
    document.getElementById('tapState').textContent=tapOn?'🟢':'🔴';
}

// === SLIDE 3: ON=1 OFF=0 ===
const bulb3State={b3a:true,b3b:false};
function toggleBulb3(id){
    bulb3State[id]=!bulb3State[id];
    const el=document.getElementById(id);
    const lbl=document.getElementById(id+'-label');
    if(bulb3State[id]){el.classList.add('on');el.classList.remove('off');lbl.textContent='1';lbl.style.color='var(--neon-green)';playOn();}
    else{el.classList.remove('on');el.classList.add('off');lbl.textContent='0';lbl.style.color='var(--neon-pink)';playOff();}
}

// === SLIDE 4: Switch wall ===
const switches=[false,false,false,false];
function toggleSwitch(i){
    switches[i]=!switches[i];
    const track=document.getElementById('sw'+i);
    const val=document.getElementById('sw'+i+'-val');
    if(switches[i]){track.classList.add('on');val.textContent='1';val.style.color='var(--neon-green)';playOn();}
    else{track.classList.remove('on');val.textContent='0';val.style.color='var(--soft-white)';playOff();}
    // Show decimal value
    let num=0;
    switches.forEach((s,idx)=>{if(s)num+=Math.pow(2,3-idx);});
    document.getElementById('switchBinary').textContent='= '+num;
}

// === SLIDE 5: Animal quiz ===
const animalRounds=[
    {show:'🐱',ask:'🐱',match:true},
    {show:'🐶',ask:'🐱',match:false},
    {show:'🐸',ask:'🐸',match:true},
    {show:'🐘',ask:'🐭',match:false},
    {show:'🦁',ask:'🦁',match:true}
];
let animalIdx=0;
function initAnimalQuiz(){
    animalIdx=0;
    renderAnimalDots();
    showAnimalRound();
}
function renderAnimalDots(){
    const d=document.getElementById('animalDots');d.innerHTML='';
    for(let i=0;i<animalRounds.length;i++){
        const dot=document.createElement('div');dot.className='dot';
        if(i<animalIdx)dot.classList.add('done');
        if(i===animalIdx)dot.classList.add('current');
        d.appendChild(dot);
    }
}
function showAnimalRound(){
    if(animalIdx>=animalRounds.length){
        document.getElementById('animalQ').innerHTML='<span style="font-size:5rem;">🏆</span>';
        document.getElementById('animalFeedback').innerHTML='<span style="color:var(--neon-green)">⭐⭐⭐</span>';
        document.getElementById('animalYes').style.display='none';
        document.getElementById('animalNo').style.display='none';
        return;
    }
    const r=animalRounds[animalIdx];
    document.getElementById('animalQ').innerHTML=
        '<span style="font-size:5rem;">'+r.show+'</span>'+
        '<span style="font-size:2.5rem;opacity:0.5">=</span>'+
        '<span style="font-size:5rem;">'+r.ask+'</span>'+
        '<span style="font-size:2.5rem;opacity:0.5">?</span>';
    document.getElementById('animalFeedback').textContent='';
    document.getElementById('animalYes').className='q-btn yes';
    document.getElementById('animalNo').className='q-btn no';
    document.getElementById('animalYes').style.display='';
    document.getElementById('animalNo').style.display='';
    document.getElementById('animalYes').disabled=false;
    document.getElementById('animalNo').disabled=false;
}
function answerAnimal(yes){
    const r=animalRounds[animalIdx];
    const correct=(yes===r.match);
    document.getElementById('animalYes').disabled=true;
    document.getElementById('animalNo').disabled=true;
    if(correct){
        playSuccess();
        document.getElementById('animalFeedback').innerHTML='<span style="color:var(--neon-green)">🎉</span>';
        const btn=document.getElementById(yes?'animalYes':'animalNo');
        btn.classList.add('correct');
        spawnConfetti(btn);
    }else{
        playError();
        document.getElementById('animalFeedback').innerHTML='<span style="color:var(--neon-pink)">😅</span>';
        document.getElementById(yes?'animalYes':'animalNo').classList.add('wrong');
        document.getElementById(yes?'animalNo':'animalYes').classList.add('correct');
    }
    animalIdx++;
    renderAnimalDots();
    setTimeout(showAnimalRound,1200);
}

// === SLIDE 6: True/False pictures ===
const tfRounds=[
    {emoji:'🌙🌃',answer:true},   // moon + night = true
    {emoji:'☀️❄️',answer:false},   // sun + snow = false
    {emoji:'🐟🌊',answer:true},    // fish + water = true
    {emoji:'🐦🔥',answer:false},   // bird + fire = false
    {emoji:'📚🎒',answer:true}     // books + backpack = true
];
let tfIdx=0;
function initTFQuiz(){
    tfIdx=0;
    renderTFDots();
    showTFRound();
}
function renderTFDots(){
    const d=document.getElementById('tfDots');d.innerHTML='';
    for(let i=0;i<tfRounds.length;i++){
        const dot=document.createElement('div');dot.className='dot';
        if(i<tfIdx)dot.classList.add('done');
        if(i===tfIdx)dot.classList.add('current');
        d.appendChild(dot);
    }
}
function showTFRound(){
    if(tfIdx>=tfRounds.length){
        document.getElementById('tfQ').innerHTML='<span style="font-size:5rem;">🏆</span>';
        document.getElementById('tfFeedback').innerHTML='<span style="color:var(--neon-green)">⭐⭐⭐</span>';
        document.getElementById('tfYes').style.display='none';
        document.getElementById('tfNo').style.display='none';
        return;
    }
    const r=tfRounds[tfIdx];
    document.getElementById('tfQ').innerHTML='<span style="font-size:5rem;">'+r.emoji+'</span><span style="font-size:2.5rem;opacity:0.5">?</span>';
    document.getElementById('tfFeedback').textContent='';
    document.getElementById('tfYes').className='q-btn yes';
    document.getElementById('tfNo').className='q-btn no';
    document.getElementById('tfYes').style.display='';
    document.getElementById('tfNo').style.display='';
    document.getElementById('tfYes').disabled=false;
    document.getElementById('tfNo').disabled=false;
}
function answerTF(yes){
    const r=tfRounds[tfIdx];
    const correct=(yes===r.answer);
    document.getElementById('tfYes').disabled=true;
    document.getElementById('tfNo').disabled=true;
    if(correct){
        playSuccess();
        document.getElementById('tfFeedback').innerHTML='<span style="color:var(--neon-green)">🎉</span>';
        spawnConfetti(document.getElementById(yes?'tfYes':'tfNo'));
    }else{
        playError();
        document.getElementById('tfFeedback').innerHTML='<span style="color:var(--neon-pink)">😅</span>';
    }
    tfIdx++;
    renderTFDots();
    setTimeout(showTFRound,1200);
}

// === SLIDE 7 & 8: Light patterns ===
function initPattern(containerId,msgId,dotsId,count,rounds){
    const state={round:0,pattern:[],userPattern:[],showing:false,rounds:rounds,count:count};
    function render(){
        const c=document.getElementById(containerId);c.innerHTML='';
        for(let i=0;i<count;i++){
            const b=document.createElement('div');b.className='pat-bulb';
            if(state.showing&&state.pattern[i])b.classList.add('on','showing');
            else if(!state.showing&&state.userPattern[i])b.classList.add('on');
            b.textContent=state.showing?(state.pattern[i]?'💡':'⚫'):(state.userPattern[i]?'💡':'⚫');
            b.onclick=(()=>{const idx=i;return()=>{if(state.showing)return;state.userPattern[idx]=!state.userPattern[idx];if(state.userPattern[idx])playOn();else playOff();render();checkPattern();}})();
            c.appendChild(b);
        }
        // dots
        const d=document.getElementById(dotsId);d.innerHTML='';
        for(let i=0;i<rounds.length;i++){
            const dot=document.createElement('div');dot.className='dot';
            if(i<state.round)dot.classList.add('done');
            if(i===state.round)dot.classList.add('current');
            d.appendChild(dot);
        }
    }
    function checkPattern(){
        const match=state.pattern.every((v,i)=>v===state.userPattern[i]);
        if(match){
            playSuccess();
            document.getElementById(msgId).innerHTML='<span style="color:var(--neon-green)">🎉</span>';
            spawnConfetti(document.getElementById(containerId));
            state.round++;
            setTimeout(()=>startRound(),1500);
        }
    }
    function startRound(){
        if(state.round>=rounds.length){
            document.getElementById(msgId).innerHTML='<span style="color:var(--neon-green)">⭐⭐⭐</span>';
            document.getElementById(containerId).innerHTML='<div style="font-size:5rem;">🏆</div>';
            const d=document.getElementById(dotsId);d.innerHTML='';
            for(let i=0;i<rounds.length;i++){const dot=document.createElement('div');dot.className='dot done';d.appendChild(dot);}
            return;
        }
        state.pattern=rounds[state.round];
        state.userPattern=new Array(count).fill(false);
        state.showing=true;
        document.getElementById(msgId).textContent='👀';
        render();
        setTimeout(()=>{
            state.showing=false;
            document.getElementById(msgId).textContent='👆';
            render();
        },2000);
    }
    return{start:startRound,render};
}

const pattern4Rounds=[
    [true,false,true,false],
    [true,true,false,false],
    [false,true,true,true]
];
const pattern6Rounds=[
    [true,false,true,false,true,false],
    [true,true,false,false,true,true],
    [false,true,false,true,false,true]
];
const pattern4Game=initPattern('pattern4','pattern4Msg','pattern4Dots',4,pattern4Rounds);
const pattern6Game=initPattern('pattern6','pattern6Msg','pattern6Dots',6,pattern6Rounds);

// === SLIDE 9: Secret letter ===
const secretWord='KOD';
const letterPatterns=[
    [1,0,0,1,0,1,0,0], // K = 75 = 01001011 simplified visual pattern
    [0,1,1,1,1,1,1,0], // O visual
    [1,1,0,0,1,1,0,0]  // D visual
];
let letterIdx=0;
let letterShowing=false;
let letterUserPattern=[];

function initSecretLetter(){
    letterIdx=0;
    renderLetterSlots();
    startLetterRound();
}
function renderLetterSlots(){
    const s=document.getElementById('letterSlots');s.innerHTML='';
    for(let i=0;i<secretWord.length;i++){
        const slot=document.createElement('div');slot.className='letter-slot';
        if(i<letterIdx){slot.classList.add('filled');slot.textContent=secretWord[i];}
        else slot.textContent='?';
        s.appendChild(slot);
    }
}
function renderLetterBulbs(){
    const c=document.getElementById('letterBulbs');c.innerHTML='';
    for(let i=0;i<8;i++){
        const b=document.createElement('div');b.className='pat-bulb';
        const isOn=letterShowing?letterPatterns[letterIdx][i]:letterUserPattern[i];
        if(isOn)b.classList.add('on');
        if(letterShowing)b.classList.add('showing');
        b.textContent=isOn?'💡':'⚫';
        b.onclick=(()=>{const idx=i;return()=>{
            if(letterShowing)return;
            letterUserPattern[idx]=letterUserPattern[idx]?0:1;
            if(letterUserPattern[idx])playOn();else playOff();
            renderLetterBulbs();
            checkLetter();
        }})();
        c.appendChild(b);
    }
}
function checkLetter(){
    const match=letterPatterns[letterIdx].every((v,i)=>v===letterUserPattern[i]);
    if(match){
        playSuccess();
        document.getElementById('letterMsg').innerHTML='<span class="gradient-text" style="font-size:3rem;">'+secretWord[letterIdx]+'</span>';
        spawnConfetti(document.getElementById('letterBulbs'));
        letterIdx++;
        renderLetterSlots();
        setTimeout(()=>{
            if(letterIdx>=secretWord.length){
                document.getElementById('letterMsg').innerHTML='<span style="color:var(--neon-green);font-size:2rem;">🎉 '+secretWord+' 🎉</span>';
                document.getElementById('letterBulbs').innerHTML='<div style="font-size:5rem;">🏆</div>';
            }else{
                startLetterRound();
            }
        },1500);
    }
}
function startLetterRound(){
    letterUserPattern=new Array(8).fill(0);
    letterShowing=true;
    document.getElementById('letterMsg').textContent='👀';
    renderLetterBulbs();
    setTimeout(()=>{
        letterShowing=false;
        document.getElementById('letterMsg').textContent='👆';
        renderLetterBulbs();
    },2500);
}

// === SLIDE ENTER HOOKS ===
const slideInited={};
function onSlideEnter(idx){
    if(slideInited[idx])return;
    slideInited[idx]=true;
    if(idx===4)initAnimalQuiz();
    if(idx===5)initTFQuiz();
    if(idx===6)pattern4Game.start();
    if(idx===7)pattern6Game.start();
    if(idx===8)initSecretLetter();
    if(idx===9){
        // bravo confetti
        setTimeout(()=>{
            const h=document.querySelector('.slide[data-slide="9"] h1');
            if(h)spawnConfetti(h);
            setTimeout(()=>spawnConfetti(h),400);
            setTimeout(()=>spawnConfetti(h),800);
        },300);
    }
}
